# =============================================================================
# Rinha de Backend 2026 - Docker Compose
# =============================================================================
# Topologia: HAProxy (LB) → 2x API (Spring Boot)
#
# Limites (HARD):
#   - Total: 1 CPU / 350 MB
#   - HAProxy: 0.10 CPU / 20 MB
#   - API 1:   0.45 CPU / 165 MB
#   - API 2:   0.45 CPU / 165 MB
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # Load Balancer - HAProxy
  # ---------------------------------------------------------------------------
  haproxy:
    image: haproxy:2.9-alpine
    hostname: haproxy
    container_name: haproxy
    ports:
      - "9999:9999"
    volumes:
      - ./haproxy.cfg:/usr/local/etc/haproxy/haproxy.cfg:ro
    depends_on:
      api1:
        condition: service_healthy
      api2:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: "0.10"
          memory: "20MB"
    networks:
      - rinha

  # ---------------------------------------------------------------------------
  # API Instance 1
  # ---------------------------------------------------------------------------
  api1:
    build:
      context: .
      dockerfile: Dockerfile
    hostname: api1
    container_name: instance-1
    environment:
      # SerialGC é mais eficiente que G1 em heaps pequenos (<200MB)
      # -XX:+TieredCompilation -XX:TieredStopAtLevel=1 acelera startup
      - JAVA_OPTS=-Xms80m -Xmx120m -XX:+UseSerialGC -XX:+TieredCompilation -XX:TieredStopAtLevel=1
    deploy:
      resources:
        limits:
          cpus: "0.45"
          memory: "165MB"
    networks:
      - rinha
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/ready"]
      interval: 2s
      timeout: 2s
      retries: 10
      start_period: 15s

  # ---------------------------------------------------------------------------
  # API Instance 2
  # ---------------------------------------------------------------------------
  api2:
    build:
      context: .
      dockerfile: Dockerfile
    hostname: api2
    container_name: instance-2
    environment:
      # SerialGC é mais eficiente que G1 em heaps pequenos (<200MB)
      # -XX:+TieredCompilation -XX:TieredStopAtLevel=1 acelera startup
      - JAVA_OPTS=-Xms80m -Xmx120m -XX:+UseSerialGC -XX:+TieredCompilation -XX:TieredStopAtLevel=1
    deploy:
      resources:
        limits:
          cpus: "0.45"
          memory: "165MB"
    networks:
      - rinha
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/ready"]
      interval: 2s
      timeout: 2s
      retries: 10
      start_period: 15s

networks:
  rinha:
    driver: bridge

