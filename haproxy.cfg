# Rinha de Backend 2026 - HAProxy Configuration
# Round-robin load balancer para 2 instâncias da API

global
    maxconn 1000

defaults
    mode http
    timeout connect 5s
    timeout client 30s
    timeout server 30s

frontend http_front
    bind *:9999
    default_backend api_servers

backend api_servers
    balance roundrobin
    option httpchk GET /ready
    http-check expect status 200

    server api1 api1:8080 check inter 1s fall 2 rise 1
    server api2 api2:8080 check inter 1s fall 2 rise 1

