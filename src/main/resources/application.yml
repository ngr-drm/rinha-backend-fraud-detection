spring:
  application:
    name: rb-fraud-detection

  # Habilita Virtual Threads (Java 21)
  threads:
    virtual:
      enabled: true

  # Desabilita banner para startup mais rápido
  main:
    banner-mode: off

  # Jackson otimizado
  jackson:
    default-property-inclusion: non_null
    serialization:
      write-dates-as-timestamps: false

server:
  port: 8080
  # Undertow tuning para baixa latência
  undertow:
    threads:
      # io: 1 thread por núcleo é suficiente (0.45 vCPU compartilhada)
      io: 1
      # Mais workers para absorver burst; bulkhead no controller limita KNN pesado.
      worker: 16
    buffer-size: 1024
    direct-buffers: true
  # Compactação desabilitada (payload pequeno, custo de CPU não compensa)
  compression:
    enabled: false

# Configurações customizadas
app:
  data:
    vectors-path: /data/vectors.bin
    vptree-path: /data/vptree.bin
    mcc-risk-path: /data/mcc_risk.json
  runtime:
    # Limite de consultas KNN pesadas concorrentes por instância.
    max-concurrent-knn: 2
    # Em produção de benchmark, evitar log por request.
    metrics-log-every: 10000
  search:
    max-nodes: 12000
    max-micros: 600

logging:
  level:
    root: WARN
    com.rb.fraud: INFO
