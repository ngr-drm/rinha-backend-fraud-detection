spring:
  application:
    name: rb-fraud-detection

  # Habilita Virtual Threads (Java 21)
  threads:
    virtual:
      enabled: true

  # Desabilita banner para startup mais rápido
  main:
    banner-mode: off

  # Jackson otimizado
  jackson:
    default-property-inclusion: non_null
    serialization:
      write-dates-as-timestamps: false

server:
  port: 8080
  # Undertow tuning para baixa latência
  undertow:
    threads:
      # io: 1 thread por núcleo é suficiente (1 vCPU compartilhada)
      io: 2
      # worker pool dimensiona requests concorrentes processados pelo handler.
      # Com worker=4 o k6 enfileira rapidamente e gera timeouts.
      # 32 é seguro mesmo com 0.45 vCPU pois o handler é CPU-bound curto.
      worker: 32
    buffer-size: 1024
    direct-buffers: true
  # Compactação desabilitada (payload pequeno, custo de CPU não compensa)
  compression:
    enabled: false

# Configurações customizadas
app:
  data:
    vectors-path: /data/vectors.bin
    vptree-path: /data/vptree.bin
    mcc-risk-path: /data/mcc_risk.json

logging:
  level:
    root: WARN
    com.rb.fraud: INFO

